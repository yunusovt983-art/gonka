syntax = "proto3";
package inference.inference;

option go_package = "github.com/productscience/inference/x/inference/types";

message PruningState {
  int64 poc_batches_pruned_epoch = 1;
  int64 poc_validations_pruned_epoch = 2;
  int64 inference_pruned_epoch = 3;
  int64 epoch_group_validations_pruned_epoch = 4;
  int64 devshard_pruned_epoch = 5;
  reserved "subnet_pruned_epoch";
  int64 poc_v2_store_commits_pruned_epoch = 6;
  int64 mlnode_weight_distributions_pruned_epoch = 7;
  int64 poc_validations_v2_pruned_epoch = 8;
  int64 poc_validation_snapshots_pruned_epoch = 9;
}
