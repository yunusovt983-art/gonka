syntax = "proto3";
package devshard.v1;
option go_package = "devshard/types";

enum TimeoutReason {
  TIMEOUT_REASON_UNSPECIFIED = 0;
  TIMEOUT_REASON_REFUSED = 1;
  TIMEOUT_REASON_EXECUTION = 2;
}

message MsgStartInference {
  uint64 inference_id = 1;
  bytes  prompt_hash = 2;
  string model = 3;
  uint64 input_length = 4;
  uint64 max_tokens = 5;
  int64  started_at = 6;
}

message MsgConfirmStart {
  uint64 inference_id = 1;
  bytes  executor_sig = 2;
  int64  confirmed_at = 3;
}

message MsgFinishInference {
  uint64 inference_id = 1;
  bytes  response_hash = 2;
  uint64 input_tokens = 3;
  uint64 output_tokens = 4;
  uint32 executor_slot = 5;
  bytes  proposer_sig = 6;
  string escrow_id = 7;
}

message MsgTimeoutInference {
  uint64 inference_id = 1;
  TimeoutReason reason = 2;
  repeated TimeoutVote votes = 3;
}

message TimeoutVote {
  uint32 voter_slot = 1;
  bool   accept = 2;
  bytes  signature = 3;
}

message MsgValidation {
  uint64 inference_id = 1;
  uint32 validator_slot = 2;
  bool   valid = 3;
  bytes  proposer_sig = 4;
  string escrow_id = 5;
}

message MsgValidationVote {
  uint64 inference_id = 1;
  uint32 voter_slot = 2;
  bool   vote_valid = 3;
  bytes  proposer_sig = 4;
  string escrow_id = 5;
}

// Deprecated: retained for wire compatibility; reveal-seed txs are ignored at runtime.
message MsgRevealSeed {
  uint32 slot_id = 1;
  bytes  signature = 2;
  bytes  proposer_sig = 3;
  string escrow_id = 4;
}

message MsgFinalizeRound {
}
