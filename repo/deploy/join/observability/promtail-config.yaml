server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: join-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    pipeline_stages:
      - docker: {}
      # Parse JSON body emitted by slog (decentralized-api and devshard).
      # Non-JSON lines (e.g. cosmos node output) are silently skipped.
      - json:
          expressions:
            level: level
            service: service
      # Promote low-cardinality fields to Loki labels for efficient filtering.
      # High-cardinality fields (trace_id, inference_id, model) stay in the log
      # body; Grafana derivedFields regex extracts trace_id for Jaeger links.
      - labels:
          service:
          level:
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        regex: '/(.*)'
        target_label: container
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: compose_service
      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        target_label: compose_project
      - source_labels: [__meta_docker_container_log_stream]
        target_label: stream
      - target_label: environment
        replacement: join
      - source_labels: [__meta_docker_container_id]
        target_label: __path__
        replacement: /var/lib/docker/containers/$1/$1-json.log